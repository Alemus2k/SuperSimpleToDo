<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 420px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .add-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .add-row input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .add-row input:focus {
      outline: none;
      border-color: #333;
    }
    .add-row button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .add-row button:hover {
      background: #555;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #eee;
    }
    li:last-child {
      border-bottom: none;
    }
    li input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    li .text {
      flex: 1;
    }
    li.done .text {
      text-decoration: line-through;
      color: #888;
    }
    li .delete-btn {
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
      background: transparent;
      color: #999;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.7;
    }
    li .delete-btn:hover {
      color: #c00;
      border-color: #c00;
      opacity: 1;
    }
    li:not(.done) .delete-btn {
      display: none;
    }
    .empty {
      color: #888;
      font-style: italic;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <h1>To-Do List</h1>
  <div class="add-row">
    <input type="text" id="newTodo" placeholder="Add something to do..." autocomplete="off">
    <button type="button" id="addBtn">Add</button>
  </div>
  <ul id="list"></ul>

  <script>
    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('newTodo');
    const addBtn = document.getElementById('addBtn');

    function render() {
      const items = getItems();
      listEl.innerHTML = '';

      if (items.length === 0) {
        listEl.innerHTML = '<li class="empty">No items yet. Add one above.</li>';
        return;
      }

      items.forEach(function (item) {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.done;
        checkbox.addEventListener('change', function () {
          toggleDone(item.id);
        });

        const text = document.createElement('span');
        text.className = 'text';
        text.textContent = item.text;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', function () {
          removeItem(item.id);
        });

        li.appendChild(checkbox);
        li.appendChild(text);
        li.appendChild(deleteBtn);
        listEl.appendChild(li);
      });
    }

    function getItems() {
      const raw = localStorage.getItem('todos');
      if (!raw) return [];
      const items = JSON.parse(raw);
      return items.sort(function (a, b) {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return a.order - b.order;
      });
    }

    function saveItems(items) {
      localStorage.setItem('todos', JSON.stringify(items));
      render();
    }

    function nextId() {
      const items = getItems();
      if (items.length === 0) return 1;
      return Math.max.apply(null, items.map(function (i) { return i.id; })) + 1;
    }

    function nextOrder() {
      const items = getItems();
      if (items.length === 0) return 0;
      return Math.max.apply(null, items.map(function (i) { return i.order; })) + 1;
    }

    function addItem(text) {
      const trimmed = (text || '').trim();
      if (!trimmed) return;
      const items = getItems();
      items.push({
        id: nextId(),
        text: trimmed,
        done: false,
        order: nextOrder()
      });
      saveItems(items);
      inputEl.value = '';
      inputEl.focus();
    }

    function toggleDone(id) {
      const items = getItems();
      const item = items.find(function (i) { return i.id === id; });
      if (!item) return;
      item.done = !item.done;
      if (item.done) item.order = nextOrder();
      saveItems(items);
    }

    function removeItem(id) {
      const items = getItems().filter(function (i) { return i.id !== id; });
      saveItems(items);
    }

    addBtn.addEventListener('click', function () {
      addItem(inputEl.value);
    });
    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addItem(inputEl.value);
    });

    render();
  </script>
</body>
</html>
